name: Build and Release

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Collect JARs
        shell: bash
        run: |
          mkdir -p release-assets
          find build/libs -maxdepth 1 -type f -name "*.jar" -print0 | while IFS= read -r -d '' file; do
            cp "$file" release-assets/
          done
          ls -la release-assets

      - name: Publish Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: auto-build
          name: Auto Build
          body: |
            Automated build artifacts from push.
            Source: ${{ github.repository }}@${{ github.sha }}
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: "release-assets/*.jar"
          token: ${{ secrets.GITHUB_TOKEN }}
